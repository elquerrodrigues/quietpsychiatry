<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="theme-color" content="#F5F3EF">
  
  <title>ANGMER | Private Domiciliary Psychiatry</title>
  <meta name="description" content="Psychiatric care directly at your residence, office, or hotel in São Paulo.">
  <meta name="robots" content="index, follow">

  <!-- HREFLANG -->
  <link rel="alternate" hreflang="pt-BR" href="https://angmer.com.br" />
  <link rel="alternate" hreflang="en" href="https://angmer.com.br/en/" />
  <link rel="alternate" hreflang="x-default" href="https://angmer.com.br" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- SCHEMA.ORG -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Physician",
      "name": "Dr. Elquer Rodrigues",
      "medicalSpecialty": "Psychiatry",
      "url": "https://angmer.com.br",
      "description": "Private domiciliary, corporate, and premium psychiatric care in São Paulo.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "São Paulo",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "priceRange": "$$$$"
    }
  </script>
  
  <style>
    :root {
      --bg: #F5F3EF;
      --text: #000000;
      --text-muted: #0A0A0A;
      --text-light: #4A453E;
      --line: rgba(0, 0, 0, 0.15);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    
    body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text-muted); line-height: 2.1; overflow-x: hidden; }

    /* FOTOS E PARALAXE */
    .parallax-divider {
      width: 100%;
      height: 45vh;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      filter: contrast(104%) brightness(94%) sepia(10%) saturate(80%);
    }

    /* CORREÇÃO DO ESTICAMENTO NO COMPUTADOR */
    @media (min-width: 1024px) {
      .parallax-divider { 
        height: 80vh; 
        background-size: contain; 
        background-attachment: scroll; 
      }
    }

    /* ESTILOS DE NAVEGAÇÃO */
    .lang-nav { position: absolute; top: 40px; right: 24px; display: flex; gap: 15px; font-size: 0.65rem; z-index: 10; }
    .lang-nav a { color: var(--text-light); text-decoration: none; }
    .lang-nav a.active { color: var(--text); font-weight: 600; }

    /* CABEÇALHO */
    header { text-align: center; padding: 18vh 24px; }
    h1 { font-family: var(--font-sans); font-size: 0.85rem; letter-spacing: 8px; color: var(--text-light); text-transform: uppercase; }
    .hero-statement { font-family: var(--font-serif); font-size: clamp(2.2rem, 6vw, 3.8rem); color: var(--text); margin: 30px auto; line-height: 1.1; max-width: 700px; }
    
    /* CONTEÚDO */
    .content-section { padding: 120px 24px; max-width: 600px; margin: 0 auto; text-align: center; }
    .profile-photo { display: block; margin: 0 auto 60px auto; height: 45vh; width: auto; filter: contrast(102%) sepia(12%) brightness(96%) saturate(85%); }
    .btn { display: inline-block; margin-top: 50px; border-bottom: 1px solid var(--text); padding-bottom: 8px; color: var(--text); text-decoration: none; text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem; }
    
    /* RODAPÉ */
    footer { text-align: center; padding: 60px 24px 100px 24px; }
    .footer-brand { font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 6px; }
  </style>
</head>
<body>

  <nav class="lang-nav">
    <a href="/">PT</a>
    <a href="/en/" class="active">EN</a>
  </nav>

  <header>
    <h1>ANGMER</h1>
    <p class="hero-statement">A psychiatrist comes to you.</p>
  </header>

  <div class="parallax-divider" style="background-image: url('/foto-servico.png');"></div>

  <section class="content-section">
    <p style="font-family: var(--font-serif); font-size: 2rem;">Domiciliary psychiatrist.</p>
    <p>In-person care at the location of the patient's choice.</p>
  </section>

  <div class="parallax-divider" style="background-image: url('/foto-dificil.png');"></div>

  <section class="content-section">
    <img src="/perfilrqe.jpeg" alt="Dr. Elquer Rodrigues" class="profile-photo">
    <p>I am Dr. Elquer Rodrigues, psychiatrist (CRM-SP 157303 • RQE 85941).</p>
  </section>

  <div class="parallax-divider" style="background-image: url('/1006.jpg');"></div>

  <section class="content-section">
    <a href="https://wa.me/5511977335683?text=Solicito%20verificar%20a%20disponibilidade%20de%20atendimento%20da%20ANGMER." target="_blank" class="btn">Check availability</a>
  </section>

  <footer>
    <div class="footer-brand">ANGMER</div>
  </footer>

</body>
</html>
