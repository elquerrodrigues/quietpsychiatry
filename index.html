<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angmer - Atendimento Privado</title>
    <style>
        /* Reset de Estilos Básicos */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f3ef; /* Tom de creme idêntico ao fundo da imagem */
            color: #2c2a29; /* Cor escura elegante para o texto, evitando o preto puro */
            font-family: 'Times New Roman', Times, serif; /* Fonte serifada clássica do site */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 24px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Cabeçalho (Logo e Menu) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            width: 100%;
            margin: 0 auto 40px auto;
        }

        .logo {
            font-size: 20px;
            letter-spacing: 0.35em; /* Espaçamento largo característico */
            font-weight: 400;
            text-transform: uppercase;
        }

        /* Ícone do Menu Hambúrguer */
        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 14px;
            cursor: pointer;
        }

        .menu-icon span {
            display: block;
            height: 1px;
            width: 100%;
            background-color: #2c2a29;
        }

        /* Conteúdo Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .section-atendimento {
            margin-bottom: 60px;
        }

        .title-atendimento {
            font-size: 13px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 28px;
            color: #5a5854;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            color: #3a3836;
        }

        /* Seção do Botão/Link Solicitar Atendimento */
        .section-solicitar {
            margin-bottom: 40px;
        }

        .btn-solicitar {
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 400;
            color: #2c2a29;
            text-decoration: none;
            padding-bottom: 6px;
            border-bottom: 1px solid #2c2a29; /* Linha horizontal fina abaixo do texto */
            display: inline-block;
            transition: opacity 0.3s ease;
        }

        .btn-solicitar:hover {
            opacity: 0.6;
        }

        /* Rodapé com Informações do Médico */
        footer {
            max-width: 600px;
            width: 100%;
            margin: 40px auto 0 auto;
        }

        .doctor-info {
            margin-bottom: 40px;
        }

        .doctor-name {
            font-size: 19px;
            font-weight: 400;
            margin-bottom: 6px;
            color: #2c2a29;
        }

        .doctor-title {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6e6c68;
            margin-bottom: 6px;
        }

        .doctor-crm {
            font-size: 11px;
            letter-spacing: 0.05em;
            color: #6e6c68;
        }

        .security-note {
            font-size: 11px;
            color: #8a8884;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ANGMER</div>
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        <section class="section-atendimento">
            <h2 class="title-atendimento">ATENDIMENTO</h2>
            <p class="subtitle">Privacidade protegida. Exposição evitada.</p>
        </section>

        <section class="section-solicitar">
            <a href="#" class="btn-solicitar">SOLICITAR ATENDIMENTO</a>
        </section>
    </main>

    <footer>
        <div class="doctor-info">
            <p class="doctor-name">Dr. Elquer Rodrigues</p>
            <p class="doctor-title">Médico Psiquiatra</p>
            <p class="doctor-crm">CRM SP 157303 • RQE 85941</p>
        </div>
        
        <p class="security-note">Comunicações protegidas por criptografia de ponta a ponta.</p>
    </footer>

</body>
</html>
