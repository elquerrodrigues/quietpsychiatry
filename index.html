<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F2F1ED">
  <title>ANGMER | Psiquiatria Concierge Particular</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F2F1ED;           
      --text: #1a1a1a;         /* Levemente mais suave que #181818 */
      --text-muted: #333333;   /* Aumentado o contraste para melhor leitura */
      --text-light: #666666;   
      --accent: #9B856A;            
      --line: rgba(26, 26, 26, 0.15); 
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-muted);    
      line-height: 1.8; /* Ajustado para melhor leitura em blocos */
      -webkit-font-smoothing: antialiased;
    }

    /* Ajuste Header com Autoridade */
    header {
      text-align: center; 
      padding: 0 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    h1 { 
      font-family: var(--font-serif);
      font-size: 2.5rem; 
      color: var(--text);
      margin: 0 0 10px 0; 
      text-transform: uppercase;
      letter-spacing: 12px;
      font-weight: 400; 
    }

    .hero-subtitle {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 50px;
    }

    .hero-statement { 
      font-family: var(--font-serif); 
      font-size: 1.8rem; 
      font-weight: 400; 
      color: var(--text); 
      margin: 0 auto 30px auto; 
      max-width: 600px;
      line-height: 1.4;
    }

    /* Refinamento de Espaçamento */
    .content-section { 
      padding: 120px 24px; /* Espaço generoso entre seções */
      max-width: 800px; 
      margin: 0 auto; 
    }

    .content p { 
      font-size: 1.1rem; /* Aumentado ligeiramente para elegância */
      color: var(--text-muted); 
      margin-bottom: 40px; 
      font-weight: 300; 
    }

    /* Estilo do Botão */
    .btn { 
      display: inline-block; 
      border: 1px solid var(--text);
      padding: 18px 45px; 
      text-decoration: none; 
      font-size: 0.7rem; 
      text-transform: uppercase; 
      letter-spacing: 4px; 
      font-weight: 500;
      color: var(--text);
      transition: all 0.3s ease;
    }
    .btn:hover { background: var(--text); color: var(--bg); }

    /* FAQ */
    .faq-item summary {
      padding: 25px 0; 
      font-weight: 500;
      font-size: 1rem;
    }
    
    /* Media Query mantida */
    @media(max-width: 768px) {
      h1 { font-size: 1.8rem; letter-spacing: 6px; }
      .hero-subtitle { letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>ANGMER</h1>
    <p class="hero-subtitle">Atendimento Psiquiátrico de Exclusividade em São Paulo</p>
    <div class="hero-text-block">
      <p class="hero-statement">Um psiquiatra vai até você.</p>
    </div>
  </header>

  <!-- O restante da sua estrutura permanece igual, apliquei apenas os ajustes de estilo acima -->
  
  <!-- ... (mantenha o restante dos seus elementos originais aqui) ... -->

</body>
</html>
