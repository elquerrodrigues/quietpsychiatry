<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>ANGMER | Psiquiatria Domiciliar Privativa</title>
  <meta name="description" content="Atendimento psiquiátrico diretamente na sua residência, escritório ou hotel em São Paulo.">
  <meta name="robots" content="index, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0A0A0A;               
      --text: #FFFFFF;             
      --text-muted: #E0E0E0;       
      --text-light: #999999;       
      --accent: #B8A38C;           
      --line: rgba(255, 255, 255, 0.15); 
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: var(--font-sans); background: #FFFFFF; color: var(--text-muted); line-height: 2.1; overflow-x: hidden; }
    .site-wrapper { background: var(--bg); width: 100%; height: 100vh; overflow: hidden; animation: expandSite 2.4s cubic-bezier(0.8, 0, 0.2, 1) forwards, unlockScroll 0s 2.4s forwards; }
    @keyframes expandSite { 0% { clip-path: inset(50% 50%); } 100% { clip-path: inset(0%); } }
    @keyframes unlockScroll { to { height: auto; overflow: visible; clip-path: none; } }

    .lang-nav { position: absolute; top: 40px; right: 24px; display: flex; gap: 15px; font-size: 0.65rem; z-index: 10; }
    .lang-nav a { color: var(--text-light); text-decoration: none; }
    
    header { text-align: center; padding: 0 24px; position: relative; min-height: 80vh; }
    h1 { position: absolute; top: 50vh; left: 50%; transform: translate(-50%, -50%); font-size: 0.85rem; color: var(--text-light); letter-spacing: 8px; animation: moveLogo 2.4s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
    @keyframes moveLogo { 0% { top: 50vh; } 100% { top: 18vh; } }
    
    .hero-text-block { padding-top: 30vh; }
    .hero-statement { font-family: var(--font-serif); font-size: clamp(2.2rem, 6vw, 3.8rem); color: var(--text); line-height: 1.1; margin: 0 auto 30px; max-width: 700px; }
    
    .parallax-divider { width: 100%; height: 78vh; background-position: center; background-repeat: no-repeat; background-size: cover; margin: 60px 0; }
    
    /* AJUSTE LEGENDA SÃO PAULO */
    .sp-banner-wrapper { width: 100%; text-align: center; margin: 60px 0; }
    .sp-banner-inner { position: relative; display: inline-block; max-width: 90%; }
    .sp-image { display: block; max-width: 100%; height: 78vh; object-fit: contain; }
    .sp-smoke { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to bottom, transparent, rgba(10,10,10,0.8)); display: flex; align-items: flex-end; justify-content: center; padding: 0 20px 50px 20px; }
    .sp-text { font-family: var(--font-serif); font-size: clamp(1.2rem, 3vw, 1.8rem); color: #FFFFFF; letter-spacing: 6px; text-transform: uppercase; margin: 0; line-height: 1.3; white-space: normal; text-align: center; }

    .content-section { padding: 120px 24px; max-width: 800px; margin: 0 auto; }
    .profile-photo { height: 58vh; width: 100%; object-fit: contain; margin-bottom: 60px; }
    
    /* FORÇAR CRM EM LINHA */
    .no-break { white-space: nowrap; }

    .faq-item summary { cursor: pointer; padding: 24px 0; border-bottom: 1px solid var(--line); color: var(--text-muted); }
    
    footer { text-align: center; padding: 60px 24px 100px 24px; }
    .footer-creds { font-size: 0.65rem; letter-spacing: 3px; color: var(--text-light); white-space: nowrap; }
    
    @media(max-width: 768px) {
      .sp-image { height: 60vh; }
      .sp-text { font-size: 1.1rem; letter-spacing: 3px; }
      .profile-photo { height: 40vh; }
    }
  </style>
</head>
<body>
<div class="site-wrapper">
  <nav class="lang-nav"><a href="/" style="font-weight:600; color:#fff;">PT</a><a href="/en/">EN</a></nav>
  <header>
    <h1>ANGMER</h1>
    <div class="hero-text-block">
      <p class="hero-statement">Um psiquiatra vai até você</p>
    </div>
  </header>
  
  <div class="parallax-divider" style="background-image: url('foto1.jpg');"></div>
  
  <section class="content-section">
    <div class="content">
      <img src="perfilrqe.jpeg" class="profile-photo" alt="Dr. Elquer Rodrigues">
      <p>Sou o Dr. Elquer Rodrigues, médico psiquiatra (<span class="no-break">CRM-SP 157303 • RQE 85941</span>).</p>
      <p>Atuo exclusivamente como médico psiquiatra há mais de doze anos. Cada atendimento é realizado pessoalmente por mim.</p>
    </div>
  </section>

  <div class="sp-banner-wrapper">
    <div class="sp-banner-inner">
      <img src="fotosaopaulo.jpg" class="sp-image" alt="São Paulo">
      <div class="sp-smoke"><p class="sp-text">Atendimento em São Paulo</p></div>
    </div>
  </div>

  <footer><div class="footer-brand">ANGMER</div><div class="footer-creds">CRM-SP 157303 • RQE 85941</div></footer>
</div>
</body>
</html>
