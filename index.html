<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psiquiatria Privada</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F5F5F3;
            --text-main: #202020;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            text-align: center;
        }

        .hero-container {
            margin-bottom: 40px;
        }

        .hero-image {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: grayscale(10%) contrast(90%);
        }

        .manifesto {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--text-main);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="hero-container">
            <img src="foto-perfil.jpg" alt="Psiquiatria Privada" class="hero-image">
        </div>

        <div class="manifesto">
            "Algumas pessoas precisam de psiquiatra. Outras precisam de psiquiatra sem serem vistas entrando em uma clínica."
        </div>

    </div>

</body>
</html>
