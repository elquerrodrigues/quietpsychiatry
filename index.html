  <style>
    /* PALETA SARTORIAL OBRIGATÓRIA (ERMENEGILDO ZEGNA AESTHETIC) */
    :root {
      --bg: #060606;               /* Veludo preto obsidiana */
      --text: #F5F3EF;             /* Marfim de seda pura */
      --text-muted: #BAB5A9;       /* Cashmere cinza quente */
      --text-light: #7D786E;       /* Fio de linho envelhecido */
      --accent: #C3AF95;           /* Detalhes em bronze sutil/brushed gold */
      --line: rgba(195, 175, 149, 0.12); /* Costura invisível de alfaiataria */
      --transition-smooth: cubic-bezier(0.25, 1, 0.5, 1);
      
      --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 2.1; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    h1, h2, h3 {
      font-family: var(--font-serif);
      font-weight: 300;
      margin: 0;
    }

    /* CAPA DO SITE (IMERSÃO TOTAL NO IPHONE) */
    header {
      text-align: center; 
      padding: 0 24px;
      display: flex;
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      min-height: 95vh;
      background: radial-gradient(circle at center, #0e0e0e 0%, var(--bg) 70%);
    }
    
    /* EFEITO LANSERHOF NA PALAVRA ANGMER */
    h1 { 
      font-size: clamp(2.6rem, 7vw, 4.5rem); 
      color: var(--text); 
      margin-bottom: 30px; 
      text-transform: uppercase;
      will-change: letter-spacing, opacity, filter;
      animation: lanserhofReveal 2.8s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
    }
    
    .subtitle { 
      font-family: var(--font-sans); 
      font-size: 0.7rem; 
      font-weight: 300; 
      letter-spacing: 8px; 
      color: var(--accent); 
      margin: 0 0 50px 0; 
      text-transform: uppercase; 
      animation: fadeInSmooth 1.5s var(--transition-smooth) 1.2s both; 
    }
    
    .tagline { 
      font-family: var(--font-serif); 
      font-weight: 400;
      font-size: clamp(1.25rem, 3.6vw, 1.6rem); 
      color: var(--text-muted); 
      max-width: 620px; 
      line-height: 1.8; 
      margin: 0 auto; 
      letter-spacing: 0.3px;
      animation: fadeInSmooth 1.5s var(--transition-smooth) 1.6s both; 
    }

    @keyframes lanserhofReveal {
      0% { opacity: 0; letter-spacing: -3px; filter: blur(6px); transform: scale(0.98); }
      30% { opacity: 0.3; filter: blur(3px); }
      100% { opacity: 1; letter-spacing: 16px; filter: blur(0); transform: scale(1); }
    }

    /* TRANSIÇÃO E ALINHAMENTO GEOMÉTRICO DAS IMAGENS GRANDES */
    .parallax-divider {
      width: 100%;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover; 
      background-attachment: fixed;
      position: relative;
      background-color: var(--bg);
      
      opacity: 0; 
      transform: scale(0.95); 
      filter: blur(4px);
      transform-origin: center center;
      
      transition: opacity 2.2s cubic-bezier(0.16, 1, 0.3, 1), 
                  transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), 
                  filter 2.2s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity, filter;
    }

    @media (min-width: 769px) {
      .parallax-divider {
        height: 70vh;
        margin: 80px 0;
      }
    }

    .parallax-divider.visible { 
      opacity: 1; 
      transform: scale(1); 
      filter: blur(0);
    }
    
    .parallax-divider::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, var(--bg) 0%, rgba(6,6,6,0) 15%, rgba(6,6,6,0) 85%, var(--bg) 100%);
    }

    /* SEÇÕES DE CONTEÚDO ELEVADAS */
    .content-section { 
      padding: 140px 24px; 
      max-width: 850px; 
      margin: 0 auto; 
      opacity: 0; 
      transform: translateY(30px); 
      transition: all 1.4s var(--transition-smooth); 
      will-change: transform, opacity; 
    }
    .content-section.visible { opacity: 1; transform: translateY(0); }

    .content { max-width: 680px; margin: 0 auto; text-align: center; }
    .content p { 
      font-size: clamp(0.95rem, 1.6vw, 1.05rem); 
      color: var(--text-muted); 
      margin-bottom: 25px;
      line-height: 2.1; 
      font-weight: 200; 
      letter-spacing: 0.3px; 
    }
    .content p:last-child { margin-bottom: 0; }
    
    .section-title { 
      font-size: clamp(1.6rem, 4vw, 2.2rem); 
      color: var(--text); 
      margin-bottom: 45px; 
      letter-spacing: 2px;
    }

    /* MOLDURA DA FOTO DE PERFIL (METADE DO TAMANHO) */
    .profile-photo {
      display: block;
      margin: 50px auto 30px auto;
      height: 35vh; 
      width: auto;
      object-fit: contain;
      border: 1px solid var(--line);
      padding: 8px;
      background-color: rgba(255, 255, 255, 0.01);
      transition: border-color 0.6s ease;
    }
    
    .profile-photo:hover {
      border-color: rgba(195, 175, 149, 0.4);
    }

    /* CAIXA INSTITUCIONAL ESTILO ATELIER ESCURO */
    .institutional-box { 
      border: 1px solid var(--line); 
      padding: 40px 45px; 
      margin-top: 50px; 
      background: linear-gradient(180deg, rgba(195,175,149,0.02) 0%, rgba(6,6,6,0) 100%); 
    }
    .institutional-box ul { list-style: none; text-align: left; display: inline-block; margin: 0 auto; }
    .institutional-box li { 
      font-family: var(--font-sans); 
      font-size: 0.95rem; 
      color: var(--text-muted); 
      margin-bottom: 20px; 
      padding-left: 25px; 
      position: relative; 
      line-height: 1.6; 
      font-weight: 200; 
    }
    .institutional-box li:last-child { margin-bottom: 0; }
    .institutional-box li strong { color: var(--text); font-weight: 400; letter-spacing: 0.5px; }
    .institutional-box li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 300; }

    /* ASSINATURA DA AUTORIDADE */
    .doctor-signature { margin-top: 30px; padding-top: 35px; border-top: 1px solid var(--line); text-align: center; }
    .doctor-signature strong { color: var(--text); font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 400; display: block; margin-bottom: 8px; }
    .doctor-signature span { color: var(--text-light); font-family: var(--font-sans); font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }

    /* BOTÃO SOB MEDIDA */
    .btn { 
      display: inline-block; 
      margin-top: 60px; 
      font-family: var(--font-sans); 
      color: var(--bg); 
      background-color: var(--text);
