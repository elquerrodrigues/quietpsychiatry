<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F9F8F6">
  <title>ANGMER | Psiquiatria Concierge Particular</title>
  <meta name="description" content="Atendimento psiquiátrico diretamente em sua residência, escritório ou hotel em São Paulo.">
  <meta name="keywords" content="psiquiatra concierge, psiquiatra hotel, psiquiatra particular em casa">
  <meta name="author" content="ANGMER">
  <meta name="robots" content="index, follow">
  <link rel="alternate" hreflang="pt-BR" href="https://angmer.com.br" />
  <link rel="alternate" hreflang="en" href="https://angmer.com.br/en/" />
  <link rel="alternate" hreflang="x-default" href="https://angmer.com.br" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Physician",
      "name": "Dr. Elquer Rodrigues",
      "medicalSpecialty": "Psychiatry",
      "url": "https://angmer.com.br/",
      "description": "Atendimento psiquiátrico domiciliar, corporativo e particular em São Paulo.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "São Paulo",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "priceRange": "$$$$"
    }
  </script>
  <style>
    :root {
      --bg: #F9F8F6;           
      --bg-alt: #FFFFFF;
      --text: #1C1C1A;          
      --text-muted: #555555;        
      --text-light: #888888;        
      --accent: #9B856A;            
      --line: rgba(0, 0, 0, 0.08); 
      --transition-smooth: cubic-bezier(0.25, 1, 0.5, 1);
      --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-muted);    
      line-height: 2.1; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    .site-wrapper {
      background: var(--bg);
      width: 100%;
      height: 100vh;
      overflow: hidden; 
      animation: expandSite 2.4s cubic-bezier(0.8, 0, 0.2, 1) forwards, unlockScroll 0s 2.4s forwards;
    }
    @keyframes expandSite {
       0% { clip-path: inset(50% 50%); } 
       15% { clip-path: inset(calc(50% - 90px)); } 
       45% { clip-path: inset(calc(50% - 90px)); } 
       100% { clip-path: inset(0%); } 
    }
    @keyframes unlockScroll {
      to { height: auto; overflow: visible; clip-path: none; }
    }
    .lang-nav {
      position: absolute;
      top: 40px;
      right: 24px;
      display: flex;
      gap: 15px;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 1px;
      z-index: 10;
      opacity: 0;
      animation: fadeNav 1s cubic-bezier(0.25, 1, 0.5, 1) 2.2s forwards;
    }
    @keyframes fadeNav {
      to { opacity: 1; }
    }
    .lang-nav a {
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .lang-nav a:hover, .lang-nav a.active {
      color: var(--text);
      font-weight: 600;
    }
    header {
      text-align: center; 
      padding: 0 24px;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { 
      position: absolute;
      top: 50vh;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-serif);
      font-size: 1rem; 
      color: var(--text);
      margin: 0; 
      text-transform: uppercase;
      letter-spacing: 10px;
      font-weight: 400; 
      z-index: 20;
      animation: moveLogo 2.4s cubic-bezier(0.8, 0, 0.2, 1) forwards;
    }
    @keyframes moveLogo {
      0% { top: 50vh; } 
      45% { top: 50vh; } 
      100% { top: 15vh; }
    }
    .hero-text-block {
      width: 100%;
      max-width: 800px;
    }
    
    @keyframes elegantFadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-statement { 
      font-family: var(--font-serif); 
      font-size: clamp(1.2rem, 3vw, 2rem); 
      font-weight: bold; 
      color: var(--text); 
      margin: 0 auto 50px auto; 
      line-height: 1.5;
      max-width: 800px;
      text-transform: uppercase;
      letter-spacing: 12px;
      opacity: 0;
      transform: translateY(30px);
      animation: elegantFadeUp 2.5s cubic-bezier(0.16, 1, 0.3, 1) 2.2s forwards;
    }
    
    .hero-locations { 
      font-family: var(--font-sans); 
      font-size: 0.65rem; 
      font-weight: bold; 
      letter-spacing: 4px; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      margin-bottom: 15px;
      opacity: 0;
      transform: translateY(30px);
      animation: elegantFadeUp 2.5s cubic-bezier(0.16, 1, 0.3, 1) 2.6s forwards;
    }
    
    .header-gallery {
      width: 100vw;
      margin-left: calc(50% - 50vw); 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50vh; 
      margin-top: 15vh; 
      margin-bottom: 400px;
    }
    
    .gallery-item {
      position: relative;
      width: 50vw; 
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.5s var(--transition-smooth), transform 1.5s var(--transition-smooth);
    }
    
    .gallery-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery-image {
      display: block;
      width: 100%;
      height: auto; 
      filter: contrast(105%) brightness(96%) sepia(5%) saturate(90%);
    }
    
    .btn { 
      display: inline-block; 
      font-family: var(--font-sans); 
      color: var(--bg);
      background-color: var(--text);
      padding: 16px 36px; 
      text-decoration: none; 
      font-size: 0.7rem; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      font-weight: 600;
      transition: opacity 0.3s ease;
      border-radius: 2px;
    }
    .btn:hover { 
      opacity: 0.8;
    }
    
    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.5s var(--transition-smooth), transform 1.5s var(--transition-smooth);
      will-change: transform, opacity;
    }
    
    .scroll-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sp-banner-wrapper {
      width: 100%;
      text-align: center;
      margin: 250px 0;
    }
    
    .sp-banner-inner {
      position: relative;
      display: block; 
      width: 100%;
      margin: 0 auto;
    }
    .sp-image {
      display: block;
      width: 100%;
      height: 78vh;
      object-fit: cover;
      filter: contrast(105%) brightness(96%) sepia(5%) saturate(90%);
    }
    .sp-smoke {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%; 
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12vh;
      pointer-events: none; 
    }
    .sp-text {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--text);
      font-weight: 300;
      letter-spacing: 1px;
      margin: 0;
    }
    
    .content-section { 
      padding: 300px 24px;
      max-width: 800px; 
      margin: 0 auto; 
    }
    
    .content { max-width: 580px; margin: 0 auto; text-align: center; }
    .content p { 
      font-size: clamp(0.95rem, 1.6vw, 1.05rem); 
      color: var(--text-muted); 
      margin-bottom: 60px; 
      line-height: 2.2; 
      font-weight: 300; 
      letter-spacing: 0.3px; 
    }
    .content p:last-child { margin-bottom: 0; }
    
    .scroll-reveal-slow {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: var(--text-light);
      margin: 40px 0; 
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }
    .scroll-reveal-slow.visible {
      opacity: 1; 
      transform: translateY(0);
    }
    .profile-photo {
      display: block;
      margin: 0 auto 150px auto; 
      height: 58vh;             
      width: auto;
      object-fit: contain;
      border: none;             
      padding: 0;
      background: transparent;
      filter: contrast(102%) sepia(5%) brightness(96%) saturate(85%);
    }

    .btn-container {
        padding-top: 120px;
        padding-bottom: 60px;
    }
    .secure-alt-contact {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: var(--text) !important;
      font-weight: bold !important;
      letter-spacing: 0.5px;
      margin-top: 12.5px;
      line-height: 1.6;
    }
    .faq-container { margin-bottom: 100px; text-align: left; } 
    .faq-item { border-bottom: 1px solid var(--line); }
    .faq-item summary {
      padding: 30px 0; 
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 500; 
      color: var(--text);
      cursor: pointer;
      list-style: none;
      position: relative;
      letter-spacing: 0.5px;
    }
    .faq-item summary::-webkit-details-marker { display: none; } 
    .faq-item summary::after {
      content: '+';
      position: absolute;
      right: 0;
      color: var(--text-light);
      font-weight: 500;
      font-size: 1.2rem;
    }
    .faq-item[open] summary { color: var(--text); font-weight: 600; }
    .faq-item[open] summary::after { content: '–'; color: var(--text); }
    .faq-answer {
      padding-bottom: 30px; 
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.9;
      font-weight: 300;
    }
    /* CORREÇÃO APLICADA: Reduzido de 145px para 60px */
    footer { text-align: center; padding: 60px 24px 250px 24px; font-family: var(--font-sans); margin: 0 auto; background-color: var(--bg); color: var(--text-muted);}
    .footer-brand { font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 6px; color: var(--text); margin-bottom: 30px; }
    .footer-luxury-tag { font-family: var(--font-sans); font-size: 0.65rem; letter-spacing: 3px; color: var(--text-light); margin-bottom: 30px; text-transform: uppercase; }
    .footer-creds { font-size: 0.65rem; letter-spacing: 3px; color: var(--text-light); margin-bottom: 35px; }
    .footer-email { display: inline-block; font-size: 0.7rem; letter-spacing: 2px; color: var(--text-muted); text-decoration: none; transition: color 0.3s ease; font-weight: 500; }
    .footer-email:hover { color: var(--accent); }
    
    @media(max-width: 768px) {
      .lang-nav { top: 25px; right: 20px; gap: 10px; }
      header { padding: 0 20px; min-height: 100vh; } 
      @keyframes moveLogo {
        0% { top: 50vh; }
        45% { top: 50vh; }
        100% { top: 12vh; } 
      }
      h1 { letter-spacing: 8px; } 
      
      .hero-statement { 
        font-size: clamp(0.8rem, 4vw, 1.2rem); 
        line-height: 1.5; 
        margin-bottom: 35px; 
        letter-spacing: 2px; 
        white-space: nowrap; 
      }
      
      .header-gallery { gap: 35vh; margin-bottom: 250px; margin-top: 15vh; } 
      .gallery-item { width: 100vw; }

      .content-section { padding: 200px 20px; }
      .profile-photo { height: 50vh; width: 100%; margin: 0 auto 100px auto; }
      
      .sp-banner-wrapper { margin: 150px 0; width: 100vw; position: relative; left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw; }
      .sp-banner-inner { width: 100%; display: block; } 
      .sp-image { width: 100vw; height: 66vh; object-fit: cover; } 
      
      .sp-smoke { padding-bottom: 8vh; height: 60%; } 
      
      .btn { display: inline-block; width: auto; text-align: center; }
    }
  </style>
</head>

</html>
