<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psiquiatria Privada</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F5F5F3;
            --text-main: #202020;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 500px;
            text-align: center;
        }

        .hero-container {
            margin-bottom: 40px;
        }

        .hero-image {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: grayscale(100%) brightness(1.1) contrast(0.8);
            opacity: 0.85;
            transition: opacity 0.5s;
        }

        .hero-image:hover {
            opacity: 1;
        }

        .manifesto {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--text-main);
            line-height: 1.4;
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            border: 1px solid var(--text-main);
            padding: 12px 30px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="hero-container">
            <img src="foto-perfil.jpg" alt="Psiquiatria Privada" class="hero-image">
        </div>

        <div class="manifesto">
            "Algumas pessoas precisam de um psiquiatra. Outras precisam de um psiquiatra sem serem vistas entrando em uma clínica."
        </div>

        <a href="mailto:contato@exemplo.com" class="cta-button">
            SOLICITAR ADMISSÃO
        </a>

    </div>

</body>
</html>
