<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angmer - Medical Luxury Concierge</title>
    <style>
        /* Reset de Estilos Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
            background-color: #fdfcfb; /* Tom off-white quente e sofisticado */
            color: #1a1a1a;
            line-height: 1.6;
            text-align: center;
            padding: 40px 20px;
        }

        /* Contentor Principal para simular o layout mobile limpo */
        .main-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 10px;
        }

        /* Bloco de Branding / Topo */
        .brand-header {
            margin-top: 30px;
            margin-bottom: 70px; /* Margem generosa para dar leveza */
        }

        .brand-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 10px; /* Espaçamento clássico de marcas de luxo */
            text-transform: uppercase;
            color: #111111;
            margin-bottom: 14px;
        }

        .brand-subtitle {
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #7a7571;
        }

        /* Secção de Mensagem Unificada */
        .content-premium {
            margin-bottom: 50px;
            padding: 0 15px;
        }

        /* Headline principal com peso ideal */
        .headline {
            font-size: 19px;
            font-weight: 400;
            line-height: 1.5;
            color: #111111;
            margin-bottom: 24px;
        }

        /* Subhead de apoio sutil */
        .subhead {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.6;
            color: #555555;
            padding: 0 5px;
        }

        /* Botão de Ação Minimalista (CTA) */
        .cta-container {
            margin-bottom: 60px;
        }

        .cta-button {
            display: inline-block;
            font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #111111;
            text-decoration: none;
            border: 1px solid #111111;
            padding: 14px 36px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: #111111;
            color: #fdfcfb;
        }

        /* Imagem de Fundo Elegante */
        .panel-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 0px; /* Cantos retos trazem mais rigidez e seriedade comercial */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <header class="brand-header">
            <h1 class="brand-title">Angmer</h1>
            <p class="brand-subtitle">Medical Luxury Concierge</p>
        </header>
        
        <main class="content-premium">
            <h2 class="headline">Atendimento psiquiátrico de alta privacidade, onde você estiver.</h2>
            <p class="subhead">Em sua residência, escritório ou hotel. Absoluta discrição, sem salas de espera.</p>
        </main>
        
        <div class="cta-container">
            <a href="#" class="cta-button">Contactar Concierge</a>
        </div>
