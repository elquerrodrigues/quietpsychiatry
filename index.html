<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAUS MERKEL</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f8f6f2;
      --text: #2c2c2c;
    }
    
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1, h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    header {
      text-align: center;
      padding: 120px 20px 100px;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 3.6rem;
      margin: 0 0 20px 0;
      letter-spacing: -2.8px;
      color: #1f1f1f;
      line-height: 1.05;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      letter-spacing: 5.5px;
      color: #666;
      margin: 0;
      text-transform: uppercase;
    }

    section {
      padding: 100px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.07);
      margin-bottom: 90px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      padding: 55px 45px;
      text-align: center;
    }

    .content h2 {
      font-size: 2.25rem;
      margin-bottom: 22px;
    }

    .content p {
      font-size: 1.18rem;
      max-width: 520px;
      margin: 0 auto;
      color: #444;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      background: #1f1f1f;
      color: white;
      padding: 18px 52px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.4s;
    }

    .btn:hover {
      background: #000;
      transform: translateY(-4px);
    }
